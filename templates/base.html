<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SentimenMBG – Analisis Opini Publik{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Bootstrap light (no data-bs-theme="dark") -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
      :root {
        /* ── Core palette ── */
        --brand-teal: #b5e0ea;
        --brand-blue: #0071e4;
        --brand-navy: #0f4c81;
        --brand-sky: #e3f4f8;
        --brand-mist: #f0f9fc;
        --brand-soft: #d6eaf5;

        /* ── Semantic sentiment colours (kept for result pages) ── */
        --positive: #16a34a;
        --neutral: #d97706;
        --negative: #dc2626;

        /* ── Surface & border ── */
        --bg-base: #f0f9fc;
        --bg-surface: #ffffff;
        --bg-card: rgba(255, 255, 255, 0.85);
        --border: rgba(0, 113, 228, 0.14);

        /* ── Text ── */
        --text-primary: #0d2a45;
        --text-secondary: #3a6080;
        --text-muted: #7aafc9;

        /* ── Shadow ── */
        --shadow: 0 4px 24px rgba(15, 76, 129, 0.1);
        --shadow-hover: 0 8px 32px rgba(15, 76, 129, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Navbar ─────────────────────────────────────────────── */
      #mainNav {
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        background: rgba(240, 249, 252, 0.88);
        border-bottom: 1px solid var(--border);
        padding-top: 0.85rem;
        padding-bottom: 0.85rem;
      }

      .brand-text {
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.3px;
        color: var(--text-primary);
      }
      .brand-accent {
        color: var(--brand-blue);
      }

      .nav-link {
        color: var(--text-secondary) !important;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-link:hover {
        color: var(--brand-blue) !important;
      }

      .btn-nav {
        border: 1px solid var(--brand-blue);
        color: var(--brand-blue);
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.4rem 1rem;
        transition: 0.2s;
        background: transparent;
      }
      .btn-nav:hover {
        background: var(--brand-blue);
        color: #fff;
      }

      /* Hamburger icon visible on light bg */
      .navbar-toggler {
        border: 1px solid var(--border) !important;
      }
      .navbar-toggler-icon {
        filter: invert(30%) sepia(60%) saturate(600%) hue-rotate(185deg);
      }

      /* ── Footer ──────────────────────────────────────────────── */
      .footer {
        border-top: 1px solid var(--border);
        background: var(--bg-surface);
        padding: 1.5rem 0;
      }
      .footer p {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin: 0;
      }
      .text-em {
        color: var(--brand-blue);
        font-weight: 600;
      }

      /* ── Utilities ───────────────────────────────────────────── */
      code {
        color: var(--brand-navy);
        background: var(--brand-sky);
        padding: 0.1rem 0.4rem;
        border-radius: 6px;
        font-size: 0.82rem;
        font-family: "JetBrains Mono", monospace;
      }
    </style>

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
          <span class="brand-text">Sentimen<span class="brand-accent">MBG</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-expanded="false">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-center gap-1">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-house me-1"></i>Beranda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="https://github.com/akino23tie/MBGSentimentAnalysis" target="_blank"><i class="bi bi-github me-1"></i>GitHub</a>
            </li>
            <li class="nav-item ms-2">
              <a class="btn btn-nav" href="{{ url_for('index') }}"><i class="bi bi-search me-1"></i>Analisis Baru</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer class="footer">
      <div class="container">
        <div class="row align-items-center g-2">
          <div class="col-md-6">
            <p><strong style="color: var(--text-primary)">SentimenMBG</strong> — Analisis opini publik terhadap Program Makan Bergizi Gratis</p>
          </div>
          <div class="col-md-6 text-md-end">
            <p>Dikembangkan Kelompok 5 menggunakan <span class="text-em">Flask</span> &amp; <span class="text-em">Bootstrap 5</span></p>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
