<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SentimenMBG – Analisis Opini Publik{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --bg-base:        #060d0e;
      --bg-surface:     #0b1718;
      --bg-card:        rgba(255,255,255,0.035);
      --border:         rgba(255,255,255,0.07);

      --emerald:        #00e5a0;
      --teal:           #00c8b8;
      --teal-deep:      #007d6e;
      --glow-mid:       #00ffc2;

      --positive:       #22c55e;
      --neutral:        #f59e0b;
      --negative:       #f43f5e;

      --text-primary:   #e8f5f2;
      --text-muted:     #7da89e;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Navbar ── */
    #mainNav {
      backdrop-filter: blur(18px);
      background: rgba(6, 13, 14, 0.80);
      border-bottom: 1px solid var(--border);
      padding-top: .85rem;
      padding-bottom: .85rem;
    }

    .brand-text {
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -.3px;
      color: var(--text-primary);
    }
    .brand-accent { color: var(--emerald); }

    .nav-link {
      color: var(--text-muted) !important;
      font-size: .875rem;
      font-weight: 500;
      transition: color .2s;
    }
    .nav-link:hover { color: var(--emerald) !important; }

    .btn-nav {
      border: 1px solid var(--emerald);
      color: var(--emerald);
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      padding: .4rem 1rem;
      transition: .2s;
    }
    .btn-nav:hover {
      background: var(--emerald);
      color: #050c0d;
    }

    /* ── Hero ── */
    .hero-section {
      position: relative;
      overflow: hidden;
      padding: 100px 0 80px;
    }

    /* flowing aurora background */
    .hero-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(0,229,160,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 20%, rgba(0,200,184,.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(0,125,110,.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .eyebrow-pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .45rem 1.1rem;
      border-radius: 999px;
      background: rgba(0,229,160,.08);
      border: 1px solid rgba(0,229,160,.2);
      color: var(--emerald);
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .5px;
    }
    .eyebrow-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--emerald);
      box-shadow: 0 0 6px var(--emerald);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(.7); }
    }

    .hero-title {
      font-size: clamp(2.1rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.5px;
    }

    .gradient-text {
      background: linear-gradient(120deg, var(--emerald) 0%, var(--glow-mid) 40%, var(--teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 400;
      max-width: 680px;
      line-height: 1.7;
    }

    /* ── Form card ── */
    .form-card {
      max-width: 740px;
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,229,160,.12);
      border-radius: 24px;
      padding: 2.2rem;
      box-shadow: 0 0 60px rgba(0,229,160,.05);
    }

    .form-label { font-size: .875rem; font-weight: 600; color: var(--text-primary); }

    .form-control,
    .input-group-text {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
      color: var(--text-primary);
      font-size: .92rem;
    }
    .form-control::placeholder { color: var(--text-muted); }
    .form-control:focus {
      background: rgba(255,255,255,.06);
      border-color: var(--emerald);
      box-shadow: 0 0 0 .25rem rgba(0,229,160,.12);
      color: var(--text-primary);
    }

    .form-range::-webkit-slider-thumb { background: var(--emerald); }
    .form-range::-webkit-slider-runnable-track {
      background: rgba(0,229,160,.2);
      border-radius: 4px;
    }

    .count-badge {
      background: rgba(0,229,160,.15);
      border: 1px solid rgba(0,229,160,.3);
      color: var(--emerald);
      font-size: .75rem;
      font-weight: 700;
      border-radius: 999px;
      padding: .2rem .65rem;
    }

    .btn-analyze {
      background: linear-gradient(120deg, var(--emerald), var(--teal));
      border: none;
      color: #050c0d;
      font-weight: 700;
      font-size: .95rem;
      padding: .85rem;
      border-radius: 14px;
      transition: .25s;
      letter-spacing: .2px;
    }
    .btn-analyze:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,229,160,.3);
      filter: brightness(1.05);
    }

    /* ── Feature cards ── */
    .features-section { padding: 60px 0 80px; }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.6rem;
      height: 100%;
      transition: .3s;
      position: relative;
      overflow: hidden;
    }
    .feature-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,229,160,.06) 0%, transparent 60%);
      opacity: 0;
      transition: .3s;
    }
    .feature-card:hover { transform: translateY(-6px); border-color: rgba(0,229,160,.25); }
    .feature-card:hover::after { opacity: 1; }

    .feat-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    .feat-icon.g  { background: rgba(34,197,94,.12); color: #22c55e; }
    .feat-icon.y  { background: rgba(245,158,11,.12); color: #f59e0b; }
    .feat-icon.e  { background: rgba(0,229,160,.12); color: var(--emerald); }
    .feat-icon.r  { background: rgba(244,63,94,.12);  color: #f43f5e; }

    .feature-title { font-weight: 700; font-size: .95rem; margin-bottom: .4rem; }
    .feature-desc  { color: var(--text-muted); font-size: .85rem; margin: 0; line-height: 1.6; }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(4,10,11,.97);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    .spinner-ring {
      width: 110px; height: 110px;
      border: 3px solid rgba(255,255,255,.06);
      border-top: 3px solid var(--emerald);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .spinner-center {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-step {
      padding: .75rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      color: var(--text-muted);
      font-size: .85rem;
      margin-bottom: .5rem;
      border: 1px solid transparent;
      transition: .3s;
    }
    .loading-step.active {
      background: rgba(0,229,160,.1);
      border-color: rgba(0,229,160,.3);
      color: var(--text-primary);
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,.015);
      padding: 1.5rem 0;
    }
    .footer p { font-size: .82rem; color: var(--text-muted); margin: 0; }
    .text-em { color: var(--emerald); }

    /* ── Utilities ── */
    code { color: var(--emerald); background: rgba(0,229,160,.08); padding: .1rem .4rem; border-radius: 6px; font-size: .82rem; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <span>🍽️</span>
      <span class="brand-text">Sentimen<span class="brand-accent">MBG</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-house me-1"></i>Beranda</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/" target="_blank"><i class="bi bi-github me-1"></i>GitHub</a>
        </li>
        <li class="nav-item ms-2">
          <a class="btn btn-nav" href="{{ url_for('index') }}"><i class="bi bi-search me-1"></i>Analisis Baru</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="footer">
  <div class="container">
    <div class="row align-items-center g-2">
      <div class="col-md-6">
        <p>🍽️ <strong style="color:var(--text-primary)">SentimenMBG</strong> — Analisis opini publik terhadap Program Makan Bergizi Gratis</p>
      </div>
      <div class="col-md-6 text-md-end">
        <p>Dibuat dengan <i class="bi bi-heart-fill text-danger"></i> menggunakan <span class="text-em">Flask</span> &amp; <span class="text-em">Bootstrap 5</span></p>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
